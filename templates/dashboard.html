<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>

        body{
            background:#f5f7fb;
            font-family:Arial,sans-serif;
        }

        .sidebar{
            height:100vh;
            background:#111827;
            color:white;
            padding:30px 20px;
            position:fixed;
            width:240px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px 15px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .sidebar .active{
            background:#f59e0b;
            color:black;
            font-weight:bold;
        }

        .main-content{
            margin-left:260px;
            padding:40px;
        }

        .custom-card{
            background:white;
            border-radius:20px;
            padding:25px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            margin-bottom:25px;
        }

        .kpi-title{
            color:#6b7280;
            font-size:14px;
        }

        .kpi-value{
            font-size:34px;
            font-weight:800;
            color:#111827;
        }

        .dashboard-title{
            font-size:42px;
            font-weight:800;
            margin-bottom:30px;
            color:#111827;
        }

    </style>

</head>
<body>

<div class="sidebar">

    <h2 class="mb-4">

        {{ session.get('company', 'Risk System') }}

    </h2>

    <a href="/forecast">
        Forecasting
    </a>

    <a href="/dashboard" class="active">
        Dashboard
    </a>

    <a href="/history">
        History
    </a>

    <a href="/accurate">
        Accurate
    </a>

    <a href="/company-selector">
        Switch Company
    </a>

    <a href="/logout">
        Logout
    </a>
</div>

<div class="main-content">

    <h1 class="dashboard-title">
        PAYMENT ANALYTICS DASHBOARD
    </h1>

    <div class="row">

        <div class="col-md-3">
            <div class="custom-card">
                <div class="kpi-title">
                    Total Invoice
                </div>
                <div class="kpi-value">
                    {{ total_invoice }}
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="custom-card">
                <div class="kpi-title">
                    Total Customer
                </div>
                <div class="kpi-value">
                    {{ total_customer }}
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="custom-card">
                <div class="kpi-title">
                    Average Delay
                </div>
                <div class="kpi-value">
                    {{ avg_delay }}
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="custom-card">
                <div class="kpi-title">
                    High Risk Invoice
                </div>
                <div class="kpi-value">
                    {{ high_risk }}
                </div>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col-lg-6">
            <div class="custom-card">
                <div id="customerChart" style="height:400px;"></div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="custom-card">
                <div id="termChart" style="height:400px;"></div>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col-lg-6">
            <div class="custom-card">
                <div id="topChart" style="height:450px;"></div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="custom-card">
                <div id="historicalChart"></div>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col-lg-12">
            <div class="custom-card">
                <div id="monthChart"></div>
            </div>
        </div>

    </div>

</div>

<script>

// =====================================
// TOP CUSTOMER CHART
// =====================================
    var topChart = echarts.init(
        document.getElementById('topChart')
    );
    var topOption = {
        title: {
            text: 'Top 5 Highest Average Delay Customer',
            left: 'left'
        },
        tooltip: {
            trigger: 'axis',
            formatter: function(params) {
                var p = params[0];
                return `
                    <b>${p.name}</b><br>
                    Average Delay: ${p.data.value} Hari<br>
                    Total Invoice: ${p.data.total}<br>
                    Highest Delay: ${p.data.max_delay} Hari
                `;
            }
        },
        xAxis: {
            type: 'value',
            name: 'Average Delay (Days)'
        },
        yAxis: {
            type: 'category',
            name: 'Customer',
            data: {{ top_labels | tojson | safe }}
        },
        series: [
            {
                type: 'bar',
                data: {{ top_chart_data | tojson | safe }},
                label: {
                    show: true,
                    position: 'right',
                    formatter: '{c} Hari'
                }
            }
        ]
    };

    topChart.setOption(topOption);

    var historicalGraph =JSON.parse(`{{ historical_graph | safe }}`);
    Plotly.newPlot(
        'historicalChart',
        historicalGraph.data,
        historicalGraph.layout
    );
    var monthGraph = JSON.parse(`{{ month_graph | safe }}`);
    Plotly.newPlot(
        'monthChart',
        monthGraph.data,
        monthGraph.layout
    );

    // =====================================
    // CUSTOMER CHART
    // =====================================
    var customerChart = echarts.init(
        document.getElementById('customerChart')
    );

    var customerOption = {
        title: {
            text: 'Late Payment Percentage by Customer Type',
            left: 'left'
        },
        tooltip: {
            trigger: 'axis',
            formatter: function(params) {
                var p = params[0];
                return `
                    <b>${p.name}</b><br>
                    Total Invoice: ${p.data.total}<br>
                    Invoice Delay: ${p.data.late}<br>
                    Persentase: ${p.data.value}%
                `;
            }
        },

        xAxis: {
            type: 'category',
            name: 'Customer Type',
            data: {{ customer_labels | tojson | safe }}
        },
        yAxis: {
            type: 'value',
            name: 'Late Percentage (%)',
            max: 100
        },
        series: [
            {
                type: 'bar',
                data: {{ customer_chart_data | tojson | safe }},
                label: {
                    show: true,
                    position: 'top',
                    formatter: '{c}%'
                }
            }
        ]
    };
    customerChart.setOption(customerOption);

    // =====================================
    // TERM CHART
    // =====================================
    var termChart = echarts.init(
        document.getElementById('termChart')
    );

    var termOption = {
        title: {
            text: 'Late Payment Percentage by Payment Term',
            left: 'left'
        },

        tooltip: {
            trigger: 'axis',
            formatter: function(params) {
                var p = params[0];
                return `
                    <b>${p.name}</b><br>
                    Total Invoice: ${p.data.total}<br>
                    Invoice Delay: ${p.data.late}<br>
                    Persentase: ${p.data.value}%
                `;
            }
        },

        xAxis: {
            type: 'category',
            name: 'Payment Term',
            data: {{ term_labels | tojson | safe }}
        },
        yAxis: {
            type: 'value',
            name: 'Late Percentage (%)',
            max: 100
        },
        series: [
            {
                type: 'bar',
                data: {{ term_chart_data | tojson | safe }},
                label: {
                    show: true,
                    position: 'top',
                    formatter: '{c}%'
                }
            }
        ]
    };

    termChart.setOption(termOption);
</script>

</body>
</html>
